name: Backend CI

on:
  pull_request:
    paths:
      - 'apps/backend/**'
      - '.github/workflows/backend-ci.yml'
  push:
    branches:
      - main
      - develop
      - 'feat/**'
      - 'hotfix/**'
    paths:
      - 'apps/backend/**'
      - '.github/workflows/backend-ci.yml'

jobs:
  backend-core-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: mwa
          POSTGRES_USER: mwa
          POSTGRES_PASSWORD: mwa
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mwa -d mwa"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 6
    env:
      DATABASE_URL: postgresql://mwa:mwa@localhost:5432/mwa?schema=public
    defaults:
      run:
        working-directory: apps/backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run required core checks
        run: npm run test:ci
