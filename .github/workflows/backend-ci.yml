name: Backend CI

on:
  pull_request:
    paths:
      - 'apps/backend/**'
      - '.github/workflows/backend-ci.yml'
  push:
    branches:
      - main
      - develop
      - 'feat/**'
      - 'hotfix/**'
    paths:
      - 'apps/backend/**'
      - '.github/workflows/backend-ci.yml'

jobs:
  backend-core-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: apps/backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run required core checks
        run: npm run test:ci
