name: Feature
description: 신규 기능 또는 기능 확장을 위한 이슈
title: "[Feature] "
labels:
  - feature
body:
  - type: markdown
    attributes:
      value: |
        ## 작성 규칙
        - 내부 문서 경로는 **반드시 `docs/` 하위만** 작성합니다.
        - 세션성 작업 메모는 이슈 본문의 유지보수 문서로 사용하지 않습니다.
        - 외부 문서(외부 repo, blog, 공식 docs)는 참고자료 섹션에 작성할 수 있습니다.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: 기능 목표와 기대 효과를 간단히 작성해주세요.
      placeholder: 예) 장바구니 API에 단일 활성 cart 규칙을 추가한다.
    validations:
      required: true

  - type: textarea
    id: internal_docs
    attributes:
      label: Internal Docs (docs/ only)
      description: 내부 참고 문서를 `docs/` 경로로만 작성해주세요.
      placeholder: |
        - docs/planning/07-backend-ticket-issues.md
        - docs/planning/03-implementation-phases.md
    validations:
      required: true

  - type: textarea
    id: external_references
    attributes:
      label: External References (optional)
      description: 외부 문서/블로그/공식 문서를 참고자료로 작성하세요.
      placeholder: |
        - https://example.com/spec
        - https://github.com/org/repo/blob/main/README.md
    validations:
      required: false

  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: 이번 이슈에서 할 일
      placeholder: |
        - API 엔드포인트 추가
        - 도메인 서비스 구현
    validations:
      required: true

  - type: textarea
    id: out_of_scope
    attributes:
      label: Out of Scope
      description: 이번 이슈에서 하지 않을 일
      placeholder: |
        - 외부 결제 연동
        - Alerting 규칙 작성
    validations:
      required: true

  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance Criteria
      description: 검증 가능한 완료 조건
      placeholder: |
        - [ ] 기능 요구사항을 충족한다.
        - [ ] 테스트가 통과한다.
        - [ ] 관련 docs가 업데이트된다.
    validations:
      required: true

  - type: textarea
    id: validation_commands
    attributes:
      label: Validation Commands
      description: 완료 전 실행할 명령어
      placeholder: |
        npm run typecheck
        npm run test:unit
        npm run test:integration
    validations:
      required: true

  - type: checkboxes
    id: docs_rule_check
    attributes:
      label: Docs Rule Check
      options:
        - label: 내부 문서 경로를 모두 `docs/` 하위로만 작성했다.
          required: true
