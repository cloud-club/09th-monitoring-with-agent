name: mwa

# 실행(모니터링 폴더에서): export USER_ID=$(id -u) && docker compose up -d --build
# 실행(루트에서): export USER_ID=$(id -u) && docker compose -f monitoring/docker-compose.yml up -d --build
# 포트: 8080 웹 · 3000 Grafana · 9090 Prometheus · 3100 Loki · 9100 node_exporter · 8088 cAdvisor(컨테이너 메트릭)
# 앱 로그(stdout vs 파일) 합치는 법 → README「애플리케이션 로그 연동」

services:
  mwa-backend:
    build:
      context: ..
      dockerfile: apps/backend/Dockerfile
    container_name: mwa-backend
    environment:
      - DATABASE_URL=postgresql://mwa:mwa@postgres:5432/mwa?schema=public
    ports:
      - "8080:8080"
    volumes:
      - ./data/backend-logs:/app/logs
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s
    networks:
      - loki

  postgres:
    container_name: mwa-postgres
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=mwa
      - POSTGRES_USER=mwa
      - POSTGRES_PASSWORD=mwa
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mwa -d mwa"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s
    networks:
      - loki

  grafana:
    container_name: mwa-grafana
    image: grafana/grafana:latest
    user: ${USER_ID:-472}
    environment:
      # 첫 로그인 admin / admin
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_DEFAULT_THEME=light
    volumes:
      - grafana_data:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    restart: unless-stopped
    depends_on:
      - prometheus
      - loki
    networks:
      - loki

  loki:
    container_name: mwa-loki
    image: grafana/loki:3.6.0
    volumes:
      - ./config/loki:/etc/loki:ro
      # 공식 예시와 동일한 컨테이너 경로(/tmp/loki). 호스트 ./data/loki 에 두어 Finder/IDE에서 청크·인덱스 확인 가능
      - ./data/loki:/tmp/loki
    ports:
      - "3100:3100"
    restart: unless-stopped
    command: -config.file=/etc/loki/loki-config.yml
    networks:
      - loki

  promtail:
    container_name: mwa-promtail
    image: grafana/promtail:2.9.8
    volumes:
      - ./data/backend-logs:/var/backend-logs:ro
      # 호스트 OS·데몬 로그 → host-files job (맥/EC2 의 /var/log)
      - /var/log:/var/log:ro
      # Docker API — 컨테이너 stdout/stderr 스트림을 읽기 위한 통로 (로그 파일 아님) → docker job
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./config/promtail:/etc/promtail:ro
    restart: unless-stopped
    command: -config.file=/etc/promtail/promtail-config.yml
    networks:
      - loki

  prometheus:
    container_name: mwa-prometheus
    image: prom/prometheus:latest
    volumes:
      - ./config/prometheus:/etc/prometheus:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    restart: unless-stopped
    networks:
      - loki
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"

  # 컨테이너별 CPU·메모리 등. Docker Desktop 에선 cgroup/경로 제한으로 지표가 비거나 늦게 뜰 수 있음 → README 트러블슈팅 참고.
  cadvisor:
    container_name: mwa-cadvisor
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    privileged: true
    ports:
      - "8088:8080"
    # docker.sock: 컨테이너 메타·Docker 전용 경로와 맞추기(Desktop 에서 지표 안 뜰 때 차이 나는 경우 많음)
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command:
      - --housekeeping_interval=15s
      - --docker_only=true
    restart: unless-stopped
    networks:
      - loki

  node-exporter:
    container_name: mwa-node-exporter
    image: prom/node-exporter:latest
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--path.rootfs=/rootfs"
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    restart: unless-stopped
    networks:
      - loki

networks:
  loki:

volumes:
  grafana_data:
  prometheus_data:
  postgres_data:
