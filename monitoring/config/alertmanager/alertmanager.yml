global:
  resolve_timeout: 5m

route:
  receiver: aiops-webhook
  group_by: ["alertname", "service", "incident_type"]
  group_wait: 10s
  group_interval: 5m
  repeat_interval: 30m

receivers:
  - name: aiops-webhook
    webhook_configs:
      - url: http://mwa-backend:8080/internal/alertmanager/webhook
        send_resolved: true
        http_config:
          authorization:
            type: Bearer
            credentials: local-alertmanager-token
